<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Maru Online — LinkedIn Company Banner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;500&family=Inter:wght@300;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Exact tokens from globals.css ── */
    :root {
      --color-bg-navy:             #1A3A5C;
      --color-cyan:                #3DB8C6;
      --color-gold:                #CDAA53;
      --color-ink-inverted:        #FAFAF8;
      --color-ink-inverted-muted:  rgba(250,250,248,0.75);
      --tracking-display:          -0.02em;
      --tracking-eyebrow:          0.2em;
      --font-display:              'Outfit', sans-serif;
      --font-body:                 'Inter', sans-serif;
      --font-weight-headline-light:  100;
      --font-weight-headline-strong: 500;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      overflow: hidden;
      background: var(--color-bg-navy);
    }

    /*
      LinkedIn Company Page cover: 1128 × 191px
      Company logo occupies left ~220px — safe zone starts at 260px
    */
    body { width: 1128px; height: 191px; }

    .artboard {
      position: relative;
      width: 1128px;
      height: 191px;
      overflow: hidden;
      background-color: var(--color-bg-navy);
    }

    /* ── Grid — BGPattern variant="grid" size=40 fill="rgba(61,184,198,0.101)" ── */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right,  rgba(61,184,198,0.10) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(61,184,198,0.10) 1px, transparent 1px);
      background-size: 40px 40px;
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 85%);
      mask-image:         radial-gradient(ellipse at center, black 30%, transparent 85%);
    }

    /* ── Circle accent — top right ── */
    .circle {
      position: absolute;
      top: -80px;
      right: -60px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      border: 1px solid rgba(61,184,198,0.12);
      pointer-events: none;
    }

    /* ── Left cyan rule ── */
    .left-rule {
      position: absolute;
      left: 0;
      top: 0;
      width: 4px;
      height: 100%;
      background: var(--color-cyan);
      opacity: 0.7;
    }

    /* ── Content — all text in one horizontal row, vertically centred ── */
    /* Safe zone: logo dead zone is left ~220px, start content at 260px  */
    .content {
      position: absolute;
      inset: 0;
      left: 260px;
      right: 160px;     /* leave room for URL on the right */
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }

    /* Eyebrow */
    .eyebrow {
      font-family: var(--font-body);
      font-size: 10px;          /* tight strip — keep eyebrow small */
      font-weight: 500;
      letter-spacing: var(--tracking-eyebrow);
      text-transform: uppercase;
      color: var(--color-cyan);
      display: block;
    }

    /* Headline row — light / strong split on one line to fit 191px height */
    .headline {
      font-family: var(--font-display);
      font-size: 34px;          /* base 28px × 1.2 = 33.6 → 34px */
      line-height: 1.05;
      letter-spacing: var(--tracking-display);
      color: var(--color-ink-inverted);
      white-space: nowrap;
    }

    .headline-light  { font-weight: var(--font-weight-headline-light);  color: var(--color-ink-inverted-muted); }
    .headline-strong { font-weight: var(--font-weight-headline-strong); }

    /* Body */
    .body {
      font-family: var(--font-body);
      font-size: 13px;          /* base 11px × 1.2 = 13.2 → 13px */
      font-weight: 300;
      color: var(--color-ink-inverted-muted);
      line-height: 1.5;
      white-space: nowrap;
    }

    .body strong {
      font-weight: 500;
      color: var(--color-gold);
    }

    /* URL — right-aligned, vertically centred */
    .url {
      position: absolute;
      right: 40px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-cyan);
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="artboard">
    <div class="bg-grid"></div>
    <div class="circle"></div>
    <div class="left-rule"></div>

    <div class="content">
      <span class="eyebrow">Building</span>
      <div class="headline">
        <span class="headline-light">Automated Workflows</span>
        <span class="headline-strong"> for Growing SMEs.</span>
      </div>
      <p class="body">
        <strong>Connection + Integration + ROI</strong> on the tools you already own.
      </p>
    </div>

    <div class="url">maruonline.com</div>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maru — LinkedIn Company Banner | AI-Powered Marketing Systems</title>
  <meta name="description" content="AI-powered marketing systems for South African SMEs. Strategy, execution, and results without the big agency price tag." />
  <meta property="og:title" content="Maru Online | Building AI-Powered Marketing Systems" />
  <meta property="og:description" content="Helping South African SMEs grow with AI Strategy and Execution." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://maruonline.com" />

  <!-- MaruOnline CSS (extracted from live site) -->
  <link rel="stylesheet" href="https://maruonline.com/_next/static/chunks/5610a9cf1a8683ab.css" />
  <link rel="stylesheet" href="https://maruonline.com/_next/static/chunks/cdde9508c3778053.css" />

  <style>
    :root{
      /* Exact colors from About Hero */
      --bg-dark: #1a1a1a;
      --text-white: #FFFFFF;
      --text-sub: #71717a; /* Zinc-500 */
      --text-muted: #a1a1aa; /* Zinc-400 */
      --accent-cyan: #3DB8C6; /* Teal */
    }
    
    html, body {
      height: 100%; 
      margin: 0; 
      padding: 0;
      background: #1a1a1a;
      overflow: hidden; /* Prevent scrollbars */
    }
    
    body {
      display: block; /* Align top-left to avoid centering artifacts */
      width: 1584px;
      height: 396px;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    /* Artboard */
    .artboard {
      width: 1584px;
      height: 396px;
      position: absolute;
      top: 0; 
      left: 0;
      overflow: hidden;
      background-color: var(--bg-dark);
      /* Ensure no external shadows */
      box-shadow: none !important;
      border: none !important;
    }

    /* Content layout - CENTRE LEFT */
    .content {
      position: absolute;
      inset: 0;
      padding-left: 380px; /* Safe space for profile image */
      display: flex;
      flex-direction: column;
      justify-content: center;
      z-index: 20;
    }

    .stack {
      max-width: 900px;
    }

    /* Kicker - "Building" */
    .kicker {
      font-size: 20px;
      font-weight: 400;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    /* Headline */
    .headline-wrapper {
      margin-bottom: 12px;
    }

    .headline-main {
      font-size: 56px;
      font-weight: 600; /* Bold */
      color: var(--text-white);
      line-height: 1.1;
      display: inline;
    }

    .headline-sub {
      font-size: 56px;
      font-weight: 300; /* Light */
      color: var(--text-sub); /* Dark Grey */
      display: block; /* Force new line */
      margin-left: 0;
      margin-top: 4px;
    }

    /* Description */
    .description {
      font-size: 20px;
      color: var(--text-muted);
      margin-top: 16px;
    }
    
    .accent-text {
      color: var(--accent-cyan);
      font-weight: 500;
    }

    .url {
      margin-top: 12px;
      font-size: 18px;
      color: var(--accent-cyan);
      font-weight: 500;
      opacity: 0.9;
    }

    /* M. Mark */
    .mark {
      position: absolute;
      left: 40px;
      top: 32px;
      font-weight: 700;
      color: var(--text-white);
      font-size: 26px;
      z-index: 30;
    }

    /* Clouds SVG Container */
    .clouds-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Specific Cloud Path Styles */
    .cloud-path {
      fill: none;
      stroke: rgba(255, 255, 255, 0.15);
      stroke-width: 0.8;
      stroke-linecap: round;
      vector-effect: non-scaling-stroke;
    }

    .cloud-path.dashed {
      stroke-dasharray: 6 8;
      stroke-opacity: 0.4;
    }

    .cloud-path.highlight {
      stroke: rgba(255, 255, 255, 0.2);
      stroke-width: 1.2;
    }

    .cloud-point {
      fill: var(--accent-cyan);
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div class="artboard" id="artboard">
    <div class="mark">M.</div>

    <svg class="clouds-container" viewBox="0 0 1584 396" preserveAspectRatio="xMidYMid slice">
        <!-- Main Organic Contour - Scaled and positioned from extracted data -->
        <!-- Based on M150 350 C... from inspection -->
        <path class="cloud-path" d="M100 450 C 50 450, 0 380, 50 320 C 30 250, 80 180, 150 190 C 190 120, 280 100, 360 140 C 440 60, 600 80, 660 180 C 750 140, 850 200, 820 300 C 860 360, 800 420, 720 430 C 650 500, 500 410, 450 480" transform="translate(0, -50) scale(1.8)" />
        
        <!-- Secondary Contour (Right side) -->
        <path class="cloud-path dashed" d="M800 300 C 820 240, 880 200, 950 220 C 1000 150, 1150 150, 1200 220 C 1280 200, 1350 250, 1320 320 C 1380 380, 1300 450, 1200 440" transform="translate(100, -20) scale(1.5)" />
        
        <!-- Highlight Curve (Top Left) -->
        <path class="cloud-path highlight" d="M400 180 C 450 120, 550 120, 600 180" transform="translate(-50, 0) scale(1.8)" />
        
        <!-- Dashed Connector (Middle) -->
        <path class="cloud-path dashed" d="M600 250 C 650 300, 750 350, 800 300" transform="translate(0, 50) scale(1.5)" />

        <!-- Accent Points (Constellation effect) -->
        <circle class="cloud-point" cx="660" cy="180" r="3" />
        <circle class="cloud-point" cx="360" cy="140" r="2.5" />
        <circle class="cloud-point" cx="1200" cy="220" r="3" />
        <circle class="cloud-point" cx="950" cy="220" r="2" />
    </svg>

    <div class="content">
      <div class="stack">
        <div class="kicker">Building</div>
        
        <div class="headline-wrapper">
          <span class="headline-main">AI-Powered Marketing Systems.</span>
          <span class="headline-sub">for South African SMEs.</span>
        </div>
        
        <div class="description">
           <span class="accent-text">Strategy + Execution + Results</span> without the big agency price tag.
        </div>
        
        <div class="url">maruonline.com</div>
      </div>
    </div>
  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Maru Online — LinkedIn Cover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;500&family=Inter:wght@300;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Exact tokens from globals.css ── */
    :root {
      --color-bg-navy:      #1A3A5C;
      --color-cyan:         #3DB8C6;
      --color-gold:         #CDAA53;
      --color-ink-inverted: #FAFAF8;
      --color-ink-inverted-muted: rgba(250,250,248,0.75);
      --tracking-display:   -0.02em;
      --tracking-eyebrow:   0.2em;
      --font-display:       'Outfit', sans-serif;
      --font-body:          'Inter', sans-serif;
      --font-weight-headline-light:  100;
      --font-weight-headline-strong: 500;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      overflow: hidden;
      background: var(--color-bg-navy);
    }

    /* LinkedIn personal cover: 1584 × 396 */
    body { width: 1584px; height: 396px; }

    .artboard {
      position: relative;
      width: 1584px;
      height: 396px;
      overflow: hidden;
      background-color: var(--color-bg-navy);
    }

    /* ── Grid pattern — exact replica of BGPattern variant="grid" size=40 fill="rgba(61,184,198,0.101)" ── */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right,  rgba(61,184,198,0.10) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(61,184,198,0.10) 1px, transparent 1px);
      background-size: 40px 40px;
      /* mask="fade-edges" → radial gradient fades toward edges */
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
      mask-image:         radial-gradient(ellipse at center, black 30%, transparent 80%);
    }

    /* ── Subtle circle accent — top right (mirrors about page) ── */
    .circle-accent {
      position: absolute;
      top: -80px;
      right: -80px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      border: 1px solid rgba(61,184,198,0.12);
      pointer-events: none;
    }

    /* ── Cyan left border rule (matches card-navy left border) ── */
    .left-rule {
      position: absolute;
      left: 0;
      top: 0;
      width: 4px;
      height: 100%;
      background: var(--color-cyan);
      opacity: 0.7;
    }

    /* ── Content — safe zone: profile photo occupies left ~360px ── */
    .content {
      position: absolute;
      inset: 0;
      left: 400px;        /* clear profile photo safe zone */
      right: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* Eyebrow — label-eyebrow from globals.css */
    .eyebrow {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: var(--tracking-eyebrow);
      text-transform: uppercase;
      color: var(--color-cyan);
      margin-bottom: 20px;
      display: block;
    }

    /* Headline — maru-headline-split pattern: light (100) / strong (500) */
    .headline {
      font-family: var(--font-display);
      font-size: 62px;
      line-height: 1.1;
      letter-spacing: var(--tracking-display);
      color: var(--color-ink-inverted);
      margin-bottom: 20px;
    }

    .headline-light  { font-weight: var(--font-weight-headline-light); }
    .headline-strong { font-weight: var(--font-weight-headline-strong); }
    .headline-muted  { color: var(--color-ink-inverted-muted); }

    /* Rule — matches globals .rule */
    .rule {
      width: 48px;
      height: 1px;
      background: rgba(61,184,198,0.4);
      border: none;
      margin-bottom: 20px;
    }

    /* Body — body-on-navy from globals.css */
    .body {
      font-family: var(--font-body);
      font-size: 20px;
      font-weight: 300;
      color: var(--color-ink-inverted-muted);
      line-height: 1.7;
    }

    .body strong {
      font-weight: 500;
      color: var(--color-gold);
    }

    /* URL — bottom right */
    .url {
      position: absolute;
      right: 48px;
      bottom: 28px;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-cyan);
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="artboard">
    <div class="bg-grid"></div>
    <div class="circle-accent"></div>
    <div class="left-rule"></div>

    <div class="content">
      <span class="eyebrow">Building</span>
      <div class="headline">
        <span class="headline-light headline-muted">Automated Workflows</span><br>
        <span class="headline-strong">for Growing SMEs.</span>
      </div>
      <hr class="rule" />
      <p class="body">
        <strong>Connection + Integration + ROI</strong> on the tools you already own.
      </p>
    </div>

    <div class="url">maruonline.com</div>
  </div>
</body>
</html>
